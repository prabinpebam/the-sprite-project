<!-- Comparison / Two-column
     Purpose: side-by-side options or before/after.
     Behavior: collapses to stacked on narrow viewports. -->

<div class="slate-compare">
  <div class="slate-compare__col">
    <p class="slate-compare__head">Today</p>
    <ul>
      <li>Markdown-only content</li>
      <li>Styling limited to MD grammar</li>
      <li>No formal component vocabulary</li>
    </ul>
  </div>
  <div class="slate-compare__col">
    <p class="slate-compare__head">With Slate</p>
    <ul>
      <li>True HTML content</li>
      <li>Token-driven design system</li>
      <li>Documented component library</li>
    </ul>
  </div>
</div>
