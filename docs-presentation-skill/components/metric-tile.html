<!-- Metric tile / Stat
     Purpose: big-number highlights (KPIs).
     Parts: __value, __label, optional __delta (--up / --down).
     A11y: value + label read together; the delta has a text equivalent. -->

<div class="slate-metrics">

  <div class="slate-metric">
    <p class="slate-metric__value">382M</p>
    <p class="slate-metric__label">Monthly active devices</p>
  </div>

  <div class="slate-metric">
    <p class="slate-metric__value">+12%</p>
    <p class="slate-metric__label">Quarter-over-quarter usage</p>
    <p class="slate-metric__delta slate-metric__delta--up">Up from last quarter</p>
  </div>

  <div class="slate-metric">
    <p class="slate-metric__value">4.6</p>
    <p class="slate-metric__label">Average store rating</p>
  </div>

</div>
