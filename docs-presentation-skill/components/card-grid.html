<!-- Card / Card grid

     Layout: data-cols="1..4" controls columns; collapses responsively.
     Variants: slate-card--interactive when the whole card is a single link.
     A11y: interactive cards wrap exactly one anchor; media needs alt text. -->

  </article>

  <article class="slate-card">
    <h3 class="slate-card__title">Annotate</h3>
    <p class="slate-card__body">Pen, highlighter, shapes, and text on top of a capture.</p>
  </article>

  <article class="slate-card slate-card--interactive">
    <a href="use-cases.md">
      <h3 class="slate-card__title">Use cases</h3>
      <p class="slate-card__body">Who uses the tool and why - read the full breakdown.</p>
    </a>
  </article>

</div>
