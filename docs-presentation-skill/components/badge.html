<!-- Badge / Pill / Tag
     Purpose: compact status or label.
     Variants: (neutral default), --brand, --info, --success, --warning, --danger. -->

<p>
  <span class="slate-badge">Neutral</span>
  <span class="slate-badge slate-badge--brand">Brand</span>
  <span class="slate-badge slate-badge--info">In review</span>
  <span class="slate-badge slate-badge--success">Shipped</span>
  <span class="slate-badge slate-badge--warning">At risk</span>
  <span class="slate-badge slate-badge--danger">Blocked</span>
</p>
