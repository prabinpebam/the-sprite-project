erif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle" style="--step:1;--i:1" class="motion-enter motion-sequence"><tspan x="257" dy="0">Complete</tspan><tspan x="257" dy="17">vertical slice</tspan></text><circle cx="419" cy="145" r="34" fill="#DDD6FE" stroke="#6D28D9" stroke-width="3" style="--step:2;--i:2" class="motion-enter motion-sequence" /><circle cx="419" cy="145" r="13" fill="#6D28D9" style="--step:2;--i:2" class="motion-enter motion-sequence" /><text x="419" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="--step:2;--i:2" class="motion-enter motion-sequence">3</text><text x="419" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle" style="--step:2;--i:2" class="motion-enter motion-sequence"><tspan x="419" dy="0">Validate</tspan><tspan x="419" dy="17">and release</tspan></text><circle cx="581" cy="145" r="34" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="3" style="--step:3;--i:3" class="motion-enter motion-sequence" /><circle cx="581" cy="145" r="13" fill="#8B5CF6" style="--step:3;--i:3" class="motion-enter motion-sequence" /><text x="581" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="--step:3;--i:3" class="motion-enter motion-sequence">4</text><text x="581" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle" style="--step:3;--i:3" class="motion-enter motion-sequence"><tspan x="581" dy="0">Open</tspan><tspan x="581" dy="17">ecosystem</tspan></text><circle cx="743" cy="145" r="34" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="3" style="--step:4;--i:4" class="motion-enter motion-sequence" /><circle cx="743" cy="145" r="13" fill="#8B5CF6" style="--step:4;--i:4" class="motion-enter motion-sequence" /><text x="743" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="--step:4;--i:4" class="motion-enter motion-sequence">5</text><text x="743" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle" style="--step:4;--i:4" class="motion-enter motion-sequence"><tspan x="743" dy="0">Build</tspan><tspan x="743" dy="17">worlds</tspan></text><circle cx="905" cy="145" r="34" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="3" style="--step:5;--i:5" class="motion-enter motion-sequence" /><circle cx="905" cy="145" r="13" fill="#8B5CF6" style="--step:5;--i:5" class="motion-enter motion-sequence" /><text x="905" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" style="--step:5;--i:5" class="motion-enter motion-sequence">6</text><text x="905" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle" style="--step:5;--i:5" class="motion-enter motion-sequence"><tspan x="905" dy="0">Complete</tspan><tspan x="905" dy="17">studio</tspan></text><rect x="55" y="265" width="280" height="28" rx="14" fill="#DCFCE7" stroke="#15803D" stroke-width="1" style="--i:24" class="motion-enter" /><text x="195.0" y="284" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#14532D" text-anchor="middle" style="--i:24" class="motion-enter">Active: working pack → export spike</text><text x="500" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5D6B7E" text-anchor="middle" style="--i:24" class="motion-enter">Advance only when the phase exit gate is demonstrated.</text></g>
