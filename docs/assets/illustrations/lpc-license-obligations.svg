<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 385"
     role="img" aria-labelledby="figure-title figure-desc" preserveAspectRatio="xMidYMid meet">
  <title id="figure-title">LPC license options ordered by permissiveness</title>
  <desc id="figure-desc">A five-step obligation ladder runs from CC0 with no attribution to GPL with attribution and copyleft requirements.</desc>
  <rect width="1000" height="385" fill="#FFFFFF" />
  <g stroke-linecap="round" stroke-linejoin="round"><text x="500" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#5D6B7E" text-anchor="middle">ORDERED BY PRACTICAL OBLIGATION</text><path d="M 70 78 V 322" stroke="#64748B" stroke-width="4" stroke-linecap="round" /><circle cx="70" cy="92" r="18" fill="#15803D" /><text x="70" y="97" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text><rect x="110" y="70" width="840" height="44" rx="8" fill="#FAFAFC" stroke="#64748B" stroke-width="1" /><text x="135" y="97" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="start">CC0</text><text x="270" y="97" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#15803D" text-anchor="start">No attribution</text><text x="520" y="97" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5D6B7E" text-anchor="start">Most permissive</text><circle cx="70" cy="150" r="18" fill="#15803D" /><text x="70" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text><rect x="110" y="128" width="840" height="44" rx="8" fill="#FAFAFC" stroke="#64748B" stroke-width="1" /><text x="135" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="start">OGA-BY</text><text x="270" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#15803D" text-anchor="start">Attribution</text><text x="520" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5D6B7E" text-anchor="start">No DRM restriction</text><circle cx="70" cy="208" r="18" fill="#15803D" /><text x="70" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text><rect x="110" y="186" width="840" height="44" rx="8" fill="#FAFAFC" stroke="#64748B" stroke-width="1" /><text x="135" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="start">CC-BY</text><text x="270" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#15803D" text-anchor="start">Attribution</text><text x="520" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5D6B7E" text-anchor="start">Credit authors</text><circle cx="70" cy="266" r="18" fill="#B45309" /><text x="70" y="271" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text><rect x="110" y="244" width="840" height="44" rx="8" fill="#FAFAFC" stroke="#64748B" stroke-width="1" /><text x="135" y="271" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="start">CC-BY-SA</text><text x="270" y="271" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#B45309" text-anchor="start">Attribution + share-alike</text><text x="520" y="271" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5D6B7E" text-anchor="start">Derivatives stay CC-BY-SA</text><circle cx="70" cy="324" r="18" fill="#B91C1C" /><text x="70" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text><rect x="110" y="302" width="840" height="44" rx="8" fill="#FAFAFC" stroke="#64748B" stroke-width="1" /><text x="135" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="start">GPL</text><text x="270" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#B91C1C" text-anchor="start">Attribution + copyleft</text><text x="520" y="329" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5D6B7E" text-anchor="start">Derivatives distributed under GPL</text><text x="70" y="356" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="middle">more obligations</text><polygon points="64,330 76,330 70,342" fill="#5D6B7E" /></g>
</svg>
