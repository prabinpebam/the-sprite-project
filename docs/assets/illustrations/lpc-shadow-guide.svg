  <title id="figure-title">Standard LPC shadow color and direction</title>
  <desc id="figure-desc">Three swatches show the standard shadow at full and 120/256 alpha plus black for dark scenes; a diagram shows top-front-left light casting down-right.</desc>
  <rect width="1000" height="320" fill="#FFFFFF" />
  <g stroke-linecap="round" stroke-linejoin="round"><text x="500" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#5D6B7E" text-anchor="middle">ONE LIGHT DIRECTION, TWO SHADOW MODES</text><rect x="50" y="70" width="170" height="130" rx="10" fill="#F4F6F8" stroke="#64748B" stroke-width="1" /><rect x="70" y="90" width="130" height="66" rx="7" fill="#2A1722" fill-opacity="1" stroke="#64748B" stroke-width="1" /><text x="135" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1F2937" text-anchor="middle">Standard shadow</text><text x="135" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="400" fill="#5D6B7E" text-anchor="middle">#2a1722 · full</text><rect x="260" y="70" width="170" height="130" rx="10" fill="#F4F6F8" stroke="#64748B" stroke-width="1" /><rect x="280" y="90" width="130" height="66" rx="7" fill="#2A1722" fill-opacity="0.469" stroke="#64748B" stroke-width="1" /><text x="345" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1F2937" text-anchor="middle">Standard alpha</text><text x="345" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="400" fill="#5D6B7E" text-anchor="middle">#2a1722 · 120/256</text><rect x="470" y="70" width="170" height="130" rx="10" fill="#F4F6F8" stroke="#64748B" stroke-width="1" /><rect x="490" y="90" width="130" height="66" rx="7" fill="#000000" fill-opacity="1" stroke="#64748B" stroke-width="1" /><text x="555" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1F2937" text-anchor="middle">Dark scenes</text><text x="555" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="400" fill="#5D6B7E" text-anchor="middle">#000000</text><rect x="690" y="70" width="260" height="200" rx="10" fill="#F4F6F8" stroke="#64748B" stroke-width="1" /><text x="820" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#5D6B7E" text-anchor="middle">LIGHTING GEOMETRY</text><circle cx="760" cy="135" r="20" fill="#F4D35E" /><path d="M 775 150 L 835 205" stroke="#B45309" stroke-width="3" fill="none" /><polygon points="830,194 842,212 822,207" fill="#B45309" /><rect x="800" y="135" width="70" height="70" rx="8" fill="#FFFFFF" stroke="#1F2937" stroke-width="2" /><path d="M 820 205 L 885 238 L 850 250 L 795 218 Z" fill="#2A1722" opacity="0.469" /><text x="820" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="820" dy="0">Light: top-front-left</tspan><tspan x="820" dy="17">Shadow: bottom-right</tspan></text></g>
