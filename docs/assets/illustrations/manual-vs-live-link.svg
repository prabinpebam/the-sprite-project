<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340"
     role="img" aria-labelledby="figure-title figure-desc" preserveAspectRatio="xMidYMid meet">
  <title id="figure-title">Manual round-trip versus live asset linking</title>
  <desc id="figure-desc">The manual workflow requires edit, export, import, slice, and replay; a live link reduces it to one edit that propagates into the running engine.</desc>
  <rect width="1000" height="340" fill="#FFFFFF" />
  <g stroke-linecap="round" stroke-linejoin="round"><text x="30" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#5D6B7E" text-anchor="start">MANUAL ROUND-TRIP</text><text x="970" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#B91C1C" text-anchor="end">five handoffs per change</text><path d="M 160 92 H 220" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" /><polygon points="220,87 230,92 220,97" fill="#B91C1C" /><path d="M 350 92 H 410" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" /><polygon points="410,87 420,92 410,97" fill="#B91C1C" /><path d="M 540 92 H 600" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" /><polygon points="600,87 610,92 600,97" fill="#B91C1C" /><path d="M 730 92 H 790" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" /><polygon points="790,87 800,92 790,97" fill="#B91C1C" /><rect x="40" y="62" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2" /><text x="100.0" y="96.32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="100.0" dy="0">Edit</tspan></text><rect x="230" y="62" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2" /><text x="290.0" y="96.32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="290.0" dy="0">Export</tspan></text><rect x="420" y="62" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2" /><text x="480.0" y="96.32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="480.0" dy="0">Import</tspan></text><rect x="610" y="62" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2" /><text x="670.0" y="96.32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="670.0" dy="0">Slice</tspan></text><rect x="800" y="62" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2" /><text x="860.0" y="96.32" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="middle"><tspan x="860.0" dy="0">Replay</tspan></text><line x1="30" y1="157" x2="970" y2="157" stroke="#64748B" stroke-width="1" /><text x="30" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#5D6B7E" text-anchor="start">WITH A LIVE LINK</text><text x="970" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#15803D" text-anchor="end">one edit, automatic propagation</text><rect x="100" y="220" width="180" height="70" rx="10" fill="#6D28D9" stroke="#6D28D9" stroke-width="2" /><text x="190.0" y="250.54" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle"><tspan x="190.0" dy="0">Edit asset</tspan><tspan x="190.0" dy="19">once</tspan></text><path d="M 280 255 H 380" fill="none" stroke="#15803D" stroke-width="3" stroke-linecap="round" /><polygon points="380,250 390,255 380,260" fill="#15803D" /><rect x="390" y="210" width="500" height="90" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="2" /><text x="640.0" y="250.54" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#14532D" text-anchor="middle"><tspan x="640.0" dy="0">Appears in the running engine</tspan><tspan x="640.0" dy="19">native files update · engine reimports</tspan></text></g>
</svg>
