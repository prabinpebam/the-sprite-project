<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320"
     role="img" aria-labelledby="figure-title figure-desc" preserveAspectRatio="xMidYMid meet">
  <title id="figure-title">Original horse animation timing</title>
  <desc id="figure-desc">Walk and eat use 150 millisecond frames, four-frame gallop uses 100 milliseconds, and eleven-frame gallop uses 50 milliseconds.</desc>
  <rect width="1000" height="320" fill="#FFFFFF" />
  <g stroke-linecap="round" stroke-linejoin="round"><text x="30" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#5D6B7E" text-anchor="start">FRAME DURATION</text><text x="955" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="end">shorter = faster</text><line x1="280.0" y1="50" x2="280.0" y2="270" stroke="#7C8CA0" stroke-width="1" /><text x="280.0" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="middle">0 ms</text><line x1="466.66666666666663" y1="50" x2="466.66666666666663" y2="270" stroke="#7C8CA0" stroke-width="1" /><text x="466.66666666666663" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="middle">50 ms</text><line x1="653.3333333333333" y1="50" x2="653.3333333333333" y2="270" stroke="#7C8CA0" stroke-width="1" /><text x="653.3333333333333" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="middle">100 ms</text><line x1="840.0" y1="50" x2="840.0" y2="270" stroke="#7C8CA0" stroke-width="1" /><text x="840.0" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#5D6B7E" text-anchor="middle">150 ms</text><text x="30" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#1F2937" text-anchor="start">Walk (4 frames)</text><rect x="280" y="70" width="560.0" height="26" rx="5" fill="#6D28D9" stroke="#6D28D9" stroke-width="0" /><text x="852.0" y="89" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="start">150 ms · 6.6 fps</text><text x="30" y="141" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#1F2937" text-anchor="start">Eat (4 frames)</text><rect x="280" y="122" width="560.0" height="26" rx="5" fill="#6D28D9" stroke="#6D28D9" stroke-width="0" /><text x="852.0" y="141" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="start">150 ms · 6.6 fps</text><text x="30" y="193" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#1F2937" text-anchor="start">Gallop (4 frames)</text><rect x="280" y="174" width="373.3333333333333" height="26" rx="5" fill="#8B5CF6" stroke="#6D28D9" stroke-width="0" /><text x="665.3333333333333" y="193" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="start">100 ms · 10 fps</text><text x="30" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#1F2937" text-anchor="start">Gallop (11 frames)</text><rect x="280" y="226" width="186.66666666666666" height="26" rx="5" fill="#8B5CF6" stroke="#6D28D9" stroke-width="0" /><text x="478.66666666666663" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1F2937" text-anchor="start">50 ms · 20 fps</text></g>
</svg>
