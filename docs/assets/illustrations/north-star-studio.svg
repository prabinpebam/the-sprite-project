<svg id="svg-play" class="svg-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500"
     role="img" aria-labelledby="figure-title figure-desc" preserveAspectRatio="xMidYMid meet">
  <title id="figure-title">North Star product architecture</title>
  <desc id="figure-desc">Three specialized producers feed one project and five shared capabilities, then scene composition and a shared export pipeline.</desc>
  <style>
    .svg-play:target .motion-enter,
    .svg-play:target .motion-grow,
    .svg-play:target .motion-ring,
    .svg-play:target .motion-draw { opacity: 0; }
