  <title id="figure-title">Token resolution through ramps to palette colors</title>
  <desc id="figure-desc">The foliage.mid token resolves to the middle color of either a summer green ramp or an autumn orange ramp.</desc>
  <rect width="1000" height="350" fill="#19151F" />
